<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NileChat — Egyptian Arabic Voice Assistant</title>
  <style>
    :root {
      --bg: #0b1020; --bg2:#0e1428; --panel: #141c34; --panel-2: #1b2647;
      --text: #e8edff; --muted: #9aa6c8; --accent: #4f9dff; --accent-2: #37e0b0;
      --border: #263356; --danger: #ff6b6b; --user:#22406e;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans Arabic", sans-serif;
      display: flex; flex-direction: column; height: 100vh; overflow: hidden;
    }
    /* Header */
    header {
      display: flex; align-items: center; gap: 14px; padding: 12px 18px;
      border-bottom: 1px solid var(--border); background: var(--bg2); flex: none;
    }
    .logo { font-weight: 800; font-size: 18px; letter-spacing: -0.3px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text; background-clip: text; color: transparent; white-space:nowrap; }
    .grow { flex: 1; }
    select, button, input, textarea { font-family: inherit; }
    .model-select, .icon-btn {
      background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
      border-radius: 10px; padding: 8px 12px; font-size: 14px; outline: none; cursor: pointer;
    }
    .model-select { max-width: 230px; }
    .icon-btn { display: inline-flex; align-items: center; gap: 6px; }
    .icon-btn:hover { border-color: var(--accent); }
    .badge { font-size: 11px; padding: 2px 8px; border-radius: 999px; border:1px solid var(--border); color: var(--muted); }
    .badge.ok { color: var(--accent-2); border-color: rgba(55,224,176,.4); }
    .badge.warn { color: #ffcf6b; border-color: rgba(255,207,107,.4); }

    /* Settings drawer */
    #settings {
      display: none; flex: none; border-bottom: 1px solid var(--border);
      background: var(--panel); padding: 14px 18px; gap: 18px; flex-wrap: wrap; align-items: flex-end;
    }
    #settings.open { display: flex; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
    .field select, .field input[type=range] {
      background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 10px; font-size: 14px;
    }
    .chk { display:flex; align-items:center; gap:8px; color:var(--muted); font-size:13px; }
    .rangeval { color: var(--accent-2); font-variant-numeric: tabular-nums; }
    .seg { display:inline-flex; border:1px solid var(--border); border-radius:8px; overflow:hidden; background:var(--panel-2); }
    .seg button { background:transparent; color:var(--muted); border:none; padding:8px 16px; font-size:14px; cursor:pointer; display:flex; align-items:center; gap:6px; transition:background .12s,color .12s; }
    .seg button:not(.active):hover { color:var(--text); }
    .seg button.active { background:var(--accent); color:#fff; }

    /* Chat area */
    #chat { flex: 1; overflow-y: auto; padding: 22px 0; }
    .wrap { max-width: 820px; margin: 0 auto; padding: 0 18px; display:flex; flex-direction:column; gap:16px; }
    .msg { display: flex; gap: 10px; align-items: flex-start; }
    .msg.user { flex-direction: row-reverse; }
    .avatar { width: 30px; height: 30px; border-radius: 8px; flex: none; display:flex; align-items:center; justify-content:center; font-size:16px; }
    .avatar.a { background: linear-gradient(135deg, var(--accent), var(--accent-2)); }
    .avatar.u { background: var(--user); }
    .bubble {
      max-width: 78%; padding: 11px 15px; border-radius: 14px; font-size: 15.5px; line-height: 1.6;
      white-space: pre-wrap; word-wrap: break-word; border: 1px solid var(--border);
    }
    .msg.user .bubble { background: var(--user); border-color: #2c4f86; }
    .msg.assistant .bubble { background: var(--panel); }
    .bubble.rtl { direction: rtl; text-align: right; }
    .meta { font-size: 11px; color: var(--muted); margin-top: 6px; display:flex; gap:10px; align-items:center; }
    .meta button { background: none; border: none; color: var(--muted); cursor: pointer; padding: 0; font-size: 12px; }
    .meta button:hover { color: var(--accent-2); }
    .empty { text-align:center; color: var(--muted); margin-top: 12vh; }
    .empty .big { font-size: 42px; margin-bottom: 10px; }
    .typing span { display:inline-block; width:7px; height:7px; margin:0 1px; border-radius:50%; background:var(--muted); animation: blink 1.2s infinite; }
    .typing span:nth-child(2){ animation-delay:.2s } .typing span:nth-child(3){ animation-delay:.4s }
    @keyframes blink { 0%,60%,100%{opacity:.25} 30%{opacity:1} }

    /* Banner (model loading) */
    #banner { display:none; flex:none; padding:8px 18px; background:rgba(79,157,255,.12); border-bottom:1px solid var(--border); font-size:13px; color:var(--muted); }
    #banner .bar { height:6px; background:var(--panel-2); border-radius:999px; overflow:hidden; margin-top:6px; }
    #banner .bar > div { height:100%; width:0%; background:linear-gradient(90deg,var(--accent),var(--accent-2)); transition:width .4s; }

    /* Composer */
    #composer { flex: none; border-top: 1px solid var(--border); background: var(--bg2); padding: 12px 0; }
    .composer-inner { max-width: 820px; margin: 0 auto; padding: 0 18px; display: flex; gap: 10px; align-items: flex-end; }
    #input {
      flex: 1; resize: none; max-height: 160px; min-height: 24px; background: var(--panel-2);
      color: var(--text); border: 1px solid var(--border); border-radius: 14px; padding: 12px 16px;
      font-size: 15.5px; line-height: 1.5; outline: none;
    }
    #input:focus { border-color: var(--accent); }
    #input.rtl { direction: rtl; text-align: right; }
    .send, .mic {
      border: none; border-radius: 12px; height: 46px; min-width: 46px; padding: 0 14px; cursor: pointer;
      font-size: 18px; display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-weight:700;
    }
    .send { background: linear-gradient(90deg, var(--accent), var(--accent-2)); color: #04121a; }
    .send:disabled { opacity: .5; cursor: not-allowed; }
    .mic { background: var(--panel-2); color: var(--text); border: 1px solid var(--border); }
    .mic.recording { background: var(--danger); color: #fff; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{filter:brightness(1)} 50%{filter:brightness(1.3)} }
    .hint { max-width:820px; margin:6px auto 0; padding:0 18px; font-size:11.5px; color:var(--muted); display:flex; justify-content:space-between; }
    .spin { width:15px;height:15px;border:2px solid rgba(4,18,26,.4);border-top-color:#04121a;border-radius:50%;animation:rot .7s linear infinite;display:inline-block }
    @keyframes rot { to { transform: rotate(360deg) } }
  </style>
</head>
<body>
  <header>
    <span class="logo">NileChat 🎙️</span>
    <select id="model" class="model-select" title="Choose the AI model"></select>
    <span class="grow"></span>
    <span class="badge" id="asrBadge" title="Speech-to-text">STT</span>
    <button class="icon-btn" id="newChat" title="New conversation">🧹 New</button>
    <button class="icon-btn" id="gear" title="Settings">⚙️</button>
  </header>

  <div id="settings">
    <div class="field">
      <label>Responder voice</label>
      <div id="voiceToggle" class="seg"></div>
      <select id="voice" style="display:none"></select>
    </div>
    <div class="field">
      <label for="speed">Speed · <span class="rangeval" id="speedVal">1.0×</span></label>
      <input type="range" id="speed" min="0.6" max="1.6" step="0.05" value="1.0" />
    </div>
    <div class="field">
      <label>Options</label>
      <label class="chk"><input type="checkbox" id="autoSpeak" checked /> speak replies aloud</label>
      <label class="chk" id="diacritizeRow" style="display:none"><input type="checkbox" id="diacritize" /> Arabic diacritization (experimental)</label>
    </div>
    <div class="field">
      <label>Status</label>
      <div style="font-size:12px;color:var(--muted)" id="statusLine">…</div>
    </div>
  </div>

  <div id="banner">
    <div id="bannerText">Loading TTS model…</div>
    <div class="bar"><div id="bannerBar"></div></div>
  </div>

  <div id="chat">
    <div class="wrap" id="messages">
      <div class="empty" id="emptyState">
        <div class="big">🎙️💬</div>
        <div>Talk or type in <b>Egyptian Arabic</b> or English.</div>
        <div style="margin-top:6px;font-size:13px">Press the mic to speak, or write a message below. Replies are spoken back.</div>
      </div>
    </div>
  </div>

  <div id="composer">
    <div class="composer-inner">
      <button class="mic" id="mic" title="Record (speech-to-text)">🎤</button>
      <textarea id="input" rows="1" placeholder="اكتب رسالتك… أو اضغط المايك واتكلم"></textarea>
      <button class="send" id="send" title="Send">➤</button>
    </div>
    <div class="hint">
      <span id="micHint">Enter to send · Shift+Enter for newline</span>
      <span id="playHint"></span>
    </div>
  </div>

<script>
const $ = (id) => document.getElementById(id);
const modelEl=$("model"), voiceEl=$("voice"), speedEl=$("speed"), speedVal=$("speedVal"),
      autoSpeak=$("autoSpeak"), gear=$("gear"), settings=$("settings"), newChatBtn=$("newChat"),
      messagesEl=$("messages"), emptyState=$("emptyState"), inputEl=$("input"),
      sendBtn=$("send"), micBtn=$("mic"), asrBadge=$("asrBadge"), statusLine=$("statusLine"),
      banner=$("banner"), bannerText=$("bannerText"), bannerBar=$("bannerBar"),
      chatScroll=$("chat"), playHint=$("playHint");

let history = [];
let audioCtx = null, currentAbort = null, scheduledSources = [];
let ttsReady = false;

// Browsers block audio playback until a user gesture. Create + resume the
// AudioContext on the first interaction so auto-spoken replies always play.
function unlockAudio() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === "suspended") audioCtx.resume();
  } catch (e) {}
}
window.addEventListener("pointerdown", unlockAudio, { once: false });
window.addEventListener("keydown", unlockAudio, { once: false });

// ---------- utils ----------
const isArabic = (t) => /[؀-ۿ]/.test(t || "");
const guessLang = (t) => isArabic(t) ? "ar" : "en";

function autoGrow() { inputEl.style.height = "auto"; inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + "px"; }
inputEl.addEventListener("input", () => { autoGrow(); inputEl.classList.toggle("rtl", isArabic(inputEl.value)); });
speedEl.addEventListener("input", () => speedVal.textContent = (+speedEl.value).toFixed(2).replace(/0$/,"") + "×");
gear.addEventListener("click", () => settings.classList.toggle("open"));
newChatBtn.addEventListener("click", () => { history=[]; messagesEl.querySelectorAll(".msg").forEach(n=>n.remove()); emptyState.style.display="block"; stopPlayback(); });

// ---------- messages ----------
function addMsg(role, text) {
  emptyState.style.display = "none";
  const msg = document.createElement("div");
  msg.className = "msg " + role;
  const av = document.createElement("div");
  av.className = "avatar " + (role === "user" ? "u" : "a");
  av.textContent = role === "user" ? "🧑" : "🤖";
  const col = document.createElement("div");
  col.style.cssText = "display:flex;flex-direction:column;max-width:100%";
  const bubble = document.createElement("div");
  bubble.className = "bubble" + (isArabic(text) ? " rtl" : "");
  bubble.textContent = text;
  col.appendChild(bubble);
  msg.appendChild(av); msg.appendChild(col);
  messagesEl.appendChild(msg);
  chatScroll.scrollTop = chatScroll.scrollHeight;
  return { msg, bubble, col };
}

function addMeta(col, text, model) {
  const meta = document.createElement("div");
  meta.className = "meta";
  const tag = document.createElement("span");
  tag.textContent = model || "";
  const replay = document.createElement("button");
  replay.textContent = "🔊 Speak";
  replay.onclick = () => speak(text, guessLang(text));
  meta.appendChild(replay);
  if (model) meta.appendChild(tag);
  col.appendChild(meta);
}

// ---------- send / agent ----------
async function sendMessage(text) {
  text = (text != null ? text : inputEl.value).trim();
  if (!text) return;
  inputEl.value = ""; autoGrow(); inputEl.classList.remove("rtl");
  addMsg("user", text);

  const { col, bubble } = addMsg("assistant", "");
  bubble.innerHTML = '<span class="typing"><span></span><span></span><span></span></span>';
  sendBtn.disabled = true;
  try {
    const r = await fetch("/api/agent", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text, history, model: modelEl.value }),
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail || ("HTTP " + r.status));
    const reply = (d.reply || "").trim();
    bubble.textContent = reply;
    bubble.classList.toggle("rtl", isArabic(reply));
    addMeta(col, reply, d.model);
    history.push({ role: "user", content: text });
    history.push({ role: "assistant", content: reply });
    if (autoSpeak.checked && reply && ttsReady) speak(reply, guessLang(reply));
  } catch (e) {
    bubble.textContent = "⚠️ " + (e.message || e);
    bubble.style.color = "var(--danger)";
  } finally {
    sendBtn.disabled = false;
  }
}
sendBtn.addEventListener("click", () => sendMessage());
inputEl.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// ---------- TTS streaming (Web Audio) ----------
function stopPlayback() {
  if (currentAbort) { currentAbort.abort(); currentAbort = null; }
  scheduledSources.forEach(s => { try { s.stop(); } catch(e){} });
  scheduledSources = [];
}

async function speak(text, language) {
  if (!text || !ttsReady) return;
  stopPlayback();
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  await audioCtx.resume();
  playHint.textContent = "🔊 synthesizing…";
  currentAbort = new AbortController();
  try {
    // Use the one-shot /api/tts (clean inference) rather than /api/tts/stream:
    // streaming has chunk-boundary artifacts that can sound like a second voice.
    // Full synthesis is ~0.15 RTF so latency stays low for short replies.
    const resp = await fetch("/api/tts", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text, language, voice: voiceEl.value || null, speed: parseFloat(speedEl.value), temperature: 0.75, diacritize: $("diacritize").checked }),
      signal: currentAbort.signal,
    });
    if (!resp.ok) throw new Error(await resp.text());
    const arr = await resp.arrayBuffer();
    const ab = await audioCtx.decodeAudioData(arr);
    const src = audioCtx.createBufferSource(); src.buffer = ab; src.connect(audioCtx.destination);
    src.onended = () => { if (playHint.textContent === "🔊 playing…") playHint.textContent = ""; };
    src.start(); scheduledSources.push(src);
    playHint.textContent = "🔊 playing…";
  } catch (e) {
    if (e.name !== "AbortError") playHint.textContent = "TTS error";
  } finally { currentAbort = null; }
}

// ---------- STT (mic) ----------
let mediaRecorder=null, chunks=[], recording=false;
async function toggleRecord() {
  if (recording) { mediaRecorder && mediaRecorder.stop(); return; }
  let stream;
  try { stream = await navigator.mediaDevices.getUserMedia({ audio: true }); }
  catch { asrBadge.textContent = "mic denied"; asrBadge.className="badge warn"; return; }
  chunks = [];
  const mime = MediaRecorder.isTypeSupported("audio/webm") ? "audio/webm"
             : (MediaRecorder.isTypeSupported("audio/ogg") ? "audio/ogg" : "");
  mediaRecorder = new MediaRecorder(stream, mime ? { mimeType: mime } : {});
  mediaRecorder.ondataavailable = (e) => { if (e.data.size) chunks.push(e.data); };
  mediaRecorder.onstop = async () => {
    stream.getTracks().forEach(t => t.stop());
    recording = false; micBtn.classList.remove("recording"); micBtn.textContent = "🎤";
    const blob = new Blob(chunks, { type: mime || "audio/webm" });
    await transcribe(blob, mime.includes("ogg") ? ".ogg" : ".webm");
  };
  mediaRecorder.start(); recording = true;
  micBtn.classList.add("recording"); micBtn.textContent = "⏹";
  asrBadge.textContent = "listening…"; asrBadge.className = "badge";
}
async function transcribe(blob, ext) {
  asrBadge.textContent = "transcribing…"; asrBadge.className = "badge";
  const fd = new FormData(); fd.append("file", blob, "rec"+ext);
  try {
    const r = await fetch("/api/stt", { method:"POST", body: fd });
    if (!r.ok) throw new Error(await r.text());
    const d = await r.json();
    const text = (d.text||"").trim();
    asrBadge.textContent = "STT " + (d.rtf!=null?("· "+d.rtf+"× rt"):"ready"); asrBadge.className="badge ok";
    if (text) sendMessage(text); else { asrBadge.textContent="no speech"; asrBadge.className="badge warn"; }
  } catch (e) { asrBadge.textContent = "STT error"; asrBadge.className="badge warn"; }
}
micBtn.addEventListener("click", toggleRecord);

// ---------- bootstrap ----------
async function loadModels() {
  try {
    const d = await (await fetch("/api/models")).json();
    modelEl.innerHTML = "";
    const groups = { openai: [], anthropic: [] };
    d.models.forEach(m => groups[m.provider] && groups[m.provider].push(m));
    const names = { openai: "OpenAI", anthropic: "Anthropic" };
    for (const prov of ["openai","anthropic"]) {
      if (!groups[prov].length) continue;
      const og = document.createElement("optgroup");
      og.label = names[prov] + (d.configured[prov] ? "" : " (no API key)");
      groups[prov].forEach(m => {
        const o = document.createElement("option");
        o.value = m.id; o.textContent = m.label + (m.configured ? "" : " 🔒");
        if (m.id === d.default) o.selected = true;
        og.appendChild(o);
      });
      modelEl.appendChild(og);
    }
  } catch(e){}
}
const VOICE_ICON = { Man: "👨", Woman: "👩" };
function setVoice(key) {
  voiceEl.value = key;
  document.querySelectorAll("#voiceToggle button").forEach(b => b.classList.toggle("active", b.dataset.key === key));
}
async function loadVoices() {
  try {
    const d = await (await fetch("/api/voices")).json();
    const voices = d.voices || [];
    voiceEl.innerHTML = "";
    const toggle = $("voiceToggle");
    toggle.innerHTML = "";
    voices.forEach(v => {
      const o = document.createElement("option"); o.value = v.key; o.textContent = v.label; voiceEl.appendChild(o);
      const b = document.createElement("button"); b.type = "button"; b.dataset.key = v.key;
      b.textContent = (VOICE_ICON[v.label] ? VOICE_ICON[v.label] + " " : "") + v.label;
      b.onclick = () => setVoice(v.key);
      toggle.appendChild(b);
    });
    const initial = voices.some(v => v.key === d.default_voice) ? d.default_voice : (voices[0] && voices[0].key);
    if (initial) setVoice(initial);
  } catch(e){}
}
async function poll() {
  try {
    const h = await (await fetch("/healthz")).json();
    ttsReady = !!h.model_loaded;
    if (h.model_loaded) {
      banner.style.display = "none";
      statusLine.innerHTML = `TTS ✅ ${h.cuda?"GPU":"CPU"} · STT ready on demand`;
    } else {
      banner.style.display = "block";
      const pct = Math.round((h.progress||0)*100);
      if (h.status === "downloading") { bannerText.textContent = `⬇ Server downloading TTS model — ${(h.downloaded_gb||0).toFixed(2)}/${(h.total_gb||5.6).toFixed(1)} GB (${pct}%)`; bannerBar.style.width = pct+"%"; }
      else if (h.status === "loading") { bannerText.textContent = "Loading TTS model into GPU…"; bannerBar.style.width = "100%"; }
      else bannerText.textContent = "Starting…";
      statusLine.textContent = "TTS loading… (chat & STT still work)";
      setTimeout(poll, 1500);
    }
  } catch(e){ setTimeout(poll, 2500); }
}
async function loadFeatures() {
  try {
    const f = await (await fetch("/api/features")).json();
    if (f.diacritization) $("diacritizeRow").style.display = "flex";
  } catch(e){}
}
loadModels(); loadVoices(); loadFeatures(); poll(); autoGrow();
</script>
</body>
</html>
